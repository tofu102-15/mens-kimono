  <main>
    <h2>お問い合わせ</h2>
    <p class="desc">買取のご相談・記事へのご質問など、お気軽にどうぞ。<br>通常2〜3営業日以内にご返信します。</p>

    <form action="https://formsubmit.co/tofu102.15@gmail.com" method="POST">
      <input type="hidden" name="_subject" value="【男の着物】お問い合わせが届きました">
      <input type="hidden" name="_next" value="https://mens-kimono.pages.dev/thanks.html">
      <input type="hidden" name="_captcha" value="false">

      <div class="form-group">
        <label>お名前 <span>必須</span></label>
        <input type="text" name="name" required placeholder="例：山田 太郎">
      </div>

      <div class="form-group">
        <label>メールアドレス <span>必須</span></label>
        <input type="email" name="email" required placeholder="例：example@gmail.com">
      </div>

      <div class="form-group">
        <label>お問い合わせ種別</label>
        <select name="type">
          <option value="買取のご相談">買取のご相談</option>
          <option value="記事への質問">記事への質問</option>
          <option value="その他">その他</option>
        </select>
      </div>

      <div class="form-group">
        <label>お問い合わせ内容 <span>必須</span></label>
        <textarea name="message" required placeholder="買取の場合：品物の種類・点数・状態などをお書きください。"></textarea>
      </div>

      <button type="submit" class="submit-btn">送信する</button>
    </form>
